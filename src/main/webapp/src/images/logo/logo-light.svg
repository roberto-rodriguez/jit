<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 145" width="370" height="145">
  <!--
    Johnson International Tax Logo
    Top part spans x=14 to x=344, center=179
    Divider line and subtitle both centered on x=179
    Transparent background
  -->

  <!-- JOHNS -->
  <text
    x="14" y="85"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="58"
    font-weight="700"
    fill="#BF9540"
    letter-spacing="2"
  >JOHNS</text>

  <!-- Globe replacing "O" — centered at x=270, y=64 -->
  <g transform="translate(270, 64)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#1C2B4A" stroke-width="2.2"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#1C2B4A" stroke-width="1.6"/>
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#1C2B4A" stroke-width="1.6"/>
    <ellipse cx="0" cy="0" rx="11.5" ry="22" fill="none" stroke="#1C2B4A" stroke-width="1.6"/>
    <path d="M -19 -11 Q 0 -14 19 -11" fill="none" stroke="#1C2B4A" stroke-width="1.6"/>
    <path d="M -19 11 Q 0 14 19 11" fill="none" stroke="#1C2B4A" stroke-width="1.6"/>
  </g>

  <!-- N -->
  <text
    x="297" y="85"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="58"
    font-weight="700"
    fill="#BF9540"
    letter-spacing="2"
  >N</text>

  <!-- Divider line — exactly from x=14 to x=344, matching top part width -->
  <line x1="14" y1="100" x2="344" y2="100" stroke="#BF9540" stroke-width="0.7" opacity="0.55"/>

  <!-- INTERNATIONAL TAX — centered on x=179 (center of top part) -->
  <text
    x="179" y="124"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15.5"
    font-weight="400"
    fill="#1C2B4A"
    letter-spacing="5.5"
    text-anchor="middle"
  >INTERNATIONAL TAX</text>

</svg>
