name: Build and deploy WAR app to Azure Web App - jit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: target/ROOT.war

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6C47329319ED47DEB11949F9862D4FA4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D6A2401C9BA44924A8EC0F3526D88135 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_462EB03EDDB14D35B53F085BB045E201 }}

      - name: Hard Reset and Cleanup
        uses: azure/cli@v2
        with:
          inlineScript: |
            # 1. Force the app to use a longer timeout (1800 seconds)
            az webapp config appsettings set --resource-group jit --name jit --settings WEBSITES_CONTAINER_START_TIME_LIMIT=1800
            
            # 2. Delete ALL files in wwwroot to prevent 'app.war' ghosting
            # This is more effective than manual Kudu deletion
            az webapp deployment source config-zip --resource-group jit --name jit --src /dev/null --clear

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'jit'
          package: 'ROOT.war'
          target-path: 'webapps' # Crucial: puts it in site/wwwroot/webapps/ROOT.war