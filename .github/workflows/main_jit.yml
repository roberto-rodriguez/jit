name: Build and deploy WAR app to Azure Web App - jit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify WAR exists
        run: ls -lah target

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: ${{ github.workspace }}/target/ROOT.war

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: artifact

      - name: Show downloaded files
        run: |
          pwd
          ls -lah
          ls -lah artifact

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6C47329319ED47DEB11949F9862D4FA4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D6A2401C9BA44924A8EC0F3526D88135 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_462EB03EDDB14D35B53F085BB045E201 }}

      - name: Deploy WAR to Azure App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euxo pipefail
            az account show
            ls -lah artifact
            test -f artifact/ROOT.war
            az webapp deploy \
              --resource-group jit \
              --name jit \
              --src-path artifact/ROOT.war \
              --type war